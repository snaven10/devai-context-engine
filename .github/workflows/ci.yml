name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./...

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for ml/ changes
        id: changes
        run: |
          if git diff --name-only ${{ github.event.before || 'HEAD~1' }} HEAD -- ml/ | grep -q .; then
            echo "ml_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ml_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.changes.outputs.ml_changed == 'true'
        with:
          python-version: "3.12"

      - name: Lint
        if: steps.changes.outputs.ml_changed == 'true'
        run: |
          pip install ruff
          ruff check ml/
